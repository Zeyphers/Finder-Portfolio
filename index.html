<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Jacob Szczepaniak — Portfolio</title>
    <meta
      name="description"
      content="The portfolio of Jacob Szczepaniak — a macOS Finder-style interactive site showcasing development projects, with folder navigation, dark mode, and more."
    />

    <!-- Open Graph (Facebook, LinkedIn, Discord, etc.) -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="Jacob Szczepaniak" />
    <meta property="og:title" content="Jacob Szczepaniak — Portfolio" />
    <meta
      property="og:description"
      content="A macOS Finder-style interactive portfolio showcasing my development projects."
    />
    <meta property="og:url" content="https://jacobszczepaniak.com/" />
    <meta property="og:image" content="https://jacobszczepaniak.com/og-image.png" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />

    <!-- Twitter / X card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Jacob Szczepaniak — Portfolio" />
    <meta
      name="twitter:description"
      content="A macOS Finder-style interactive portfolio showcasing my development projects."
    />
    <meta name="twitter:image" content="https://jacobszczepaniak.com/og-image.png" />

    <!-- Preconnect to font hosts so their first requests start sooner.
         (GitHub-hosted images go through the same-origin /api/image-proxy, so no
         preconnect to raw.githubusercontent.com is needed.) -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <!-- Load fonts via a non-render-blocking <link> instead of a CSS @import.
         Only the Inter weights the UI actually uses (400-800; 300 is unused). -->
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=VT323&display=swap"
    />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
